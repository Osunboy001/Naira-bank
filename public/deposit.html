<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - NairaBank</title>
    <link rel="stylesheet" href="deposit.css">

</head>
<body>
        <div id="sidebar-container"></div>
    <div class="deposit-container">
        <div class="deposit-card">
            <h1>Deposit Money</h1>
            <p class="subtitle">Fund your NairaBank account securely</p>

            <form id="depositForm">
                <div class="form-group">
                    <label for="amount">Amount (₦)</label>
                    <input 
                        type="number" 
                        id="amount" 
                        placeholder="Enter amount" 
                        min="100"
                        required
                    >
                    <small>Minimum: ₦100</small>
                </div>

                <div class="form-group">
                    <label for="description">Description (Optional)</label>
                    <input 
                        type="text" 
                        id="description" 
                        placeholder="Your deposit fund is for what?"
                    >
                </div>

                <div id="result" class="result"></div>

                <button type="submit" class="btn-deposit">
                    <span id="btnText">Proceed to Payment</span>
                    <span id="loader" style="display:none;">Processing...</span>
                </button>

                <a href="/index.html" class="btn-back">← Back to Dashboard</a>
            </form>

            <div class="info-box">
                <h4> How it works</h4>
                <ol>
                    <li>Enter the amount you want to deposit</li>
                    <li>Click "Proceed to Payment"</li>
                    <li>Complete payment on Paystack</li>
                    <li>Your balance updates instantly</li>
                </ol>
            </div>
        </div>
    </div>
    


        <script>
    fetch('main-sidebar.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById("sidebar-container").innerHTML = data;
      });
  </script>


    <script src="deposit.js"></script>

</body>
</html>
