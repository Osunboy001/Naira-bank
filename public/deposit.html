<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit Money - NairaBank</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="deposit.css">

</head>
<body>
<div class="layout">
<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN CONTENT -->
<div class="main-content">
<div class="deposit-page">

<!-- HEADER -->
<div class="page-header fade-in">
<div class="header-content">
<h1>New Deposit</h1>
<p class="header-subtitle">Fund your account securely and instantly</p>
</div>
</div>

<!-- MAIN CONTAINER -->
<div class="deposit-grid">

<!-- LEFT SIDE - FORM -->
<div class="form-section fade-in">
<form id="depositForm" class="deposit-form">

<!-- STEP 1: DEPOSIT AMOUNT -->
<div class="form-step">
<div class="step-header">
<span class="step-number">1</span>
<h3>Deposit Amount</h3>
</div>

<!-- AMOUNT DISPLAY -->
<div class="amount-display">
<span class="currency">₦</span>
<input 
    type="number" 
    id="amount" 
    class="amount-input"
    placeholder="0.00" 
    min="100"
    required
>
</div>

<!-- QUICK AMOUNT BUTTONS -->
<div class="amount-presets">
<button type="button" class="preset-btn" data-amount="100">₦100</button>
<button type="button" class="preset-btn" data-amount="250">₦250</button>
<button type="button" class="preset-btn" data-amount="500">₦500</button>
<button type="button" class="preset-btn" data-amount="1000">₦1,000</button>
</div>

<!-- HELPER TEXT -->
<div class="form-helper">
<small>Minimum deposit: <strong>₦100</strong></small>
</div>
</div>

<!-- STEP 2: PAYMENT METHOD -->
<div class="form-step">
<div class="step-header">
<span class="step-number">2</span>
<h3>Choose Method</h3>
</div>

<div class="payment-methods">
<label class="payment-option selected">
    <input type="radio" name="method" value="card" checked>
    <div class="option-content">
        <i class="fas fa-credit-card"></i>
        <div>
            <strong>Credit / Debit Card</strong>
            <small>Instant, saved card ending in 4321</small>
        </div>
    </div>
    <i class="fas fa-check-circle"></i>
</label>

<label class="payment-option">
    <input type="radio" name="method" value="bank">
    <div class="option-content">
        <i class="fas fa-university"></i>
        <div>
            <strong>Bank Transfer (ACH)</strong>
            <small>1-3 Days</small>
        </div>
    </div>
    <i class="fas fa-check-circle"></i>
</label>
</div>
</div>

<!-- DESCRIPTION (OPTIONAL) -->
<div class="form-group">
<label for="description">Description (Optional)</label>
<input 
type="text" 
id="description" 
class="description-input"
placeholder="What is this deposit for?"
>
</div>

<!-- ERROR/SUCCESS MESSAGE -->
<div id="result" class="result-message"></div>

<!-- CONFIRM BUTTON -->
<button type="submit" class="btn-confirm">
<span id="btnText">
<i class="fas fa-lock"></i>
Confirm Deposit
</span>
<span id="loader" style="display:none;">
<i class="fas fa-spinner fa-spin"></i>
Processing...
</span>
</button>

<!-- BACK BUTTON -->
<a href="/login-user.html" class="btn-back">
<i class="fas fa-arrow-left"></i>
Back to Dashboard
</a>
</form>
</div>

<!-- RIGHT SIDE - SUMMARY -->
<div class="summary-section fade-in">
<div class="summary-card">
<div class="summary-header">
<h2>Summary</h2>
</div>

<div class="summary-content">
<div class="summary-item">
<span class="summary-label">Deposit Amount</span>
<span class="summary-value">
    <span id="summaryAmount">₦0.00</span>
</span>
</div>

<div class="summary-divider"></div>

<div class="summary-item">
<span class="summary-label">Processing Fee</span>
<span class="summary-value fee">₦0.00</span>
</div>

<div class="summary-item">
<span class="summary-label">Instant Availability</span>
<span class="summary-value">
    <i class="fas fa-check-circle"></i>
    Yes
</span>
</div>

<div class="summary-divider"></div>

<div class="summary-item total">
<span class="summary-label">Total</span>
<span class="summary-value">
    <span id="summaryTotal">₦0.00</span>
</span>
</div>
</div>

<div class="summary-security">
<i class="fas fa-lock"></i>
<p>Secure Encrypted</p>
</div>
</div>

<!-- BENEFITS & ANIMATION CARD -->
<div class="benefits-card">
<h3>Why Choose Us</h3>
<div class="typewriter-text" id="typewriterText"></div>
</div>
</div>
</div>
</div>
</div>
</div>


<script>
fetch('main-sidebar.html')
.then(res => res.text())
.then(data => {
document.getElementById("sidebar-container").innerHTML = data;
});
</script>
<script src="deposit.js"></script>
</body>
</html>
