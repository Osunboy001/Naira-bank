<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - NairaBank</title>
  <link rel="stylesheet" href="reset-password.css">
</head>
<body>
  <div class="reset-container">
    <!-- LEFT SIDE - FORM -->
    <div class="reset-form-section">
      <div class="reset-form-content">
        <div class="reset-header">
          <h1>Reset Password</h1>
          <p>Create a strong new password for your account</p>
        </div>

        <form onsubmit="resetPassword(event)">
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input 
              type="password" 
              id="newPassword" 
              placeholder="Enter new password"
              required
            >
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input 
              type="password" 
              id="confirmPassword" 
              placeholder="Confirm password"
              required
            >
          </div>

          <button type="submit" class="reset-btn">Update Password</button>
        </form>

        <p id="passwordMessage" class="message"></p>

        <div class="reset-footer">
          <p>Remember your password? <a href="/login-user.html">Login here</a></p>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDE - IMAGE -->
    <div class="reset-image-section">
      <div class="reset-image-wrapper">
        <img src="img/reset-pasword.png" alt="Reset Password" class="reset-image">
        <div class="image-overlay">
          <h2>Secure Your Account</h2>
          <p>Keep your account safe with a strong password</p>
        </div>
      </div>
    </div>
  </div>

  <script src="reset-password.js"></script>
</body>
</html>
