<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit User - NairaBank Admin</title>
  <link rel="stylesheet" href="admin-edit.css">
</head>

<body>
  <div class="layout">
    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="page">
        <h1 class="title">Edit User</h1>
        <p class="subtitle">Update user information and profile picture</p>

        <div class="card">
          <div class="card-content">
            
            <!-- LEFT - FORM -->
            <div class="form-section">
              <form class="form">
                <div class="form-group">
                  <label>Full Name</label>
                  <input id="name" type="text" placeholder="Enter full name">
                </div>

                <div class="form-group">
                  <label>Email Address</label>
                  <input id="email" type="email" placeholder="Enter email address">
                </div>

                <div class="form-group">
                  <label>Account Number</label>
                  <input id="account" type="text" placeholder="Account Number" disabled>
                </div>

                <button type="button" onclick="updateUser()">Save Changes</button>
                <p id="message"></p>
              </form>
            </div>

            <!-- RIGHT - PROFILE -->
            <div class="profile-section">
              <div class="profile">
                <img src="https://via.placeholder.com/150" id="profileImg" alt="Profile">
                <p class="label">Profile Picture</p>
                
                <!-- Hidden file input -->
                <input 
                  type="file" 
                  id="imageInput" 
                  accept="image/*" 
                  style="display: none;"
                  onchange="previewImage(event)"
                >
                
                <!-- Upload button -->
                <button type="button" class="btn-upload" onclick="document.getElementById('imageInput').click()">
                  📷 Upload Photo
                </button>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script>
    fetch('main-sidebar.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById("sidebar-container").innerHTML = data;
      });
  </script>

  <script src="admin-edit.js"></script>
</body>
</html>
